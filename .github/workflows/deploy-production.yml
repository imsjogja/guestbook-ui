name: Deploy GuestFlow UI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: guestflow-ui-production
  cancel-in-progress: false

jobs:
  test:
    name: Test UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build UI
        run: npm run build

  deploy:
    name: Deploy UI to production
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -eu
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY secret is required}"
          : "${DEPLOY_KNOWN_HOSTS:?DEPLOY_KNOWN_HOSTS secret is required}"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/guestflow_deploy"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/guestflow_deploy" "$HOME/.ssh/known_hosts"

      - name: Pull and deploy UI
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -eu
          : "${DEPLOY_HOST:?DEPLOY_HOST secret is required}"
          : "${DEPLOY_USER:?DEPLOY_USER secret is required}"
          ssh -i "$HOME/.ssh/guestflow_deploy" \
            -p "${DEPLOY_PORT:-22}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -se' <<'REMOTE'
          set -eu
          cd /home/ubuntu/apps/guestflow/ui
          test -z "$(git status --porcelain)"
          git pull --ff-only origin main
          docker compose -f docker-compose.production.yml up -d --build
          docker compose -f docker-compose.production.yml ps
          curl -fsS http://127.0.0.1:13000/ >/dev/null
          REMOTE
